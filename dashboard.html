<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Faiz &amp; Varshana · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<!-- FIREBASE (compat, loaded in head) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --ink:#3d0e14; --ink-2:#531320; --panel:rgba(255,255,255,.03);
  --ivory:#f5efe3; --gold:#b08d5b; --gold-2:#d4b57a; --gold-hi:#f3dfa1;
  --line:rgba(176,141,91,.22); --micro:'Inter Tight',sans-serif;
  --serif:'Fraunces',serif; --italic:'Cormorant Garamond',serif;
  --ok:#5fae7e; --no:#c97a7a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{background:linear-gradient(180deg,#1e0608,#3d0e14 45%,#3d0e14);color:var(--ivory);font-family:var(--micro);min-height:100vh;padding:1.2rem;}
a{color:var(--gold-2);}
.wrap{max-width:760px;margin:0 auto;}

/* login */
#login{max-width:380px;margin:14vh auto 0;padding:2rem 1.6rem;border:1px solid var(--gold);background:rgba(30,8,10,.6);text-align:center;}
#login h1{font-family:var(--serif);font-style:italic;font-weight:300;font-size:2rem;color:var(--gold-hi);margin-bottom:.3rem;}
#login .sub{font-family:var(--italic);font-style:italic;opacity:.7;margin-bottom:1.6rem;}
input{width:100%;padding:.85rem 1rem;background:transparent;border:1px solid var(--line);color:var(--ivory);font-family:var(--italic);font-style:italic;font-size:1rem;margin-bottom:.8rem;}
input:focus{outline:none;border-color:var(--gold);}
.btn{display:inline-block;width:100%;padding:.95rem;background:var(--gold);color:var(--ink);border:none;font-family:var(--micro);font-size:.65rem;letter-spacing:.35em;cursor:pointer;text-transform:uppercase;transition:background .3s;text-align:center;text-decoration:none;}
.btn:hover{background:var(--gold-hi);}
.btn.ghost{background:transparent;color:var(--ivory);border:1px solid var(--gold-dim,rgba(176,141,91,.4));}
.btn.ghost:hover{background:var(--gold);color:var(--ink);}

/* dashboard */
#dash{display:none;}
.head{text-align:center;margin-bottom:1.6rem;}
.head .eyebrow{font-size:.55rem;letter-spacing:.4em;color:var(--gold);margin-bottom:.5rem;}
.head h1{font-family:var(--serif);font-style:italic;font-weight:300;font-size:2.2rem;color:var(--gold-hi);}
.head .meta{font-family:var(--italic);font-style:italic;opacity:.65;font-size:.95rem;margin-top:.2rem;}

.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem;margin-bottom:1.4rem;}
@media(min-width:620px){.stats{grid-template-columns:repeat(4,1fr);}}
.stat{border:1px solid var(--line);background:var(--panel);padding:1.1rem .8rem;text-align:center;}
.stat .num{font-family:var(--serif);font-weight:300;font-size:2.1rem;color:var(--gold-hi);line-height:1;}
.stat .lbl{font-size:.5rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;margin-top:.5rem;}

.card{border:1px solid var(--line);background:var(--panel);padding:1.2rem;margin-bottom:1.2rem;}
.card h2{font-family:var(--serif);font-style:italic;font-weight:300;font-size:1.4rem;color:var(--ivory);margin-bottom:.9rem;}
.row{display:flex;gap:.6rem;flex-wrap:wrap;}
.row .btn{width:auto;flex:1;min-width:120px;}

.linkout{margin-top:.8rem;word-break:break-all;font-family:var(--italic);font-style:italic;color:var(--gold-2);font-size:.95rem;display:none;padding:.7rem;border:1px dashed var(--line);}

table{width:100%;border-collapse:collapse;font-size:.85rem;}
th,td{text-align:left;padding:.6rem .5rem;border-bottom:1px solid var(--line);}
th{font-size:.5rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;font-weight:500;}
td .pill{font-size:.55rem;letter-spacing:.15em;padding:.2rem .5rem;border-radius:999px;text-transform:uppercase;}
.pill.yes{background:rgba(95,174,126,.16);color:var(--ok);}
.pill.no{background:rgba(201,122,122,.16);color:var(--no);}
.empty{text-align:center;opacity:.5;font-family:var(--italic);font-style:italic;padding:1.4rem;}
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(30,8,10,.95);border:1px solid var(--gold);color:var(--ivory);padding:.7rem 1.2rem;font-size:.75rem;letter-spacing:.1em;opacity:0;transition:all .3s;z-index:99;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="login" class="wrap">
  <h1>Faiz &amp; Varshana</h1>
  <div class="sub">Guest Links</div>
  <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
  <button class="btn" onclick="doLogin()">Enter</button>
</div>

<div id="dash" class="wrap">
  <div class="head">
    <div class="eyebrow">DIGIWED · ADMIN</div>
    <h1>Faiz &amp; Varshana</h1>
    <div class="meta">30 August 2026 · Heavens Convention Center, Malappuram</div>
  </div>

  <div class="card">
    <h2>Personalised Invite Link</h2>
    <input type="text" id="guestInput" placeholder="Guest's full name" oninput="buildLink()"/>
    <div class="row">
      <button class="btn" onclick="copyLink()">Copy Link</button>
      <a class="btn ghost" id="waShare" href="#" target="_blank">Share on WhatsApp</a>
    </div>
    <div class="linkout" id="linkOut"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PASSWORD  = "faizvarshana2026";
const BASE_URL  = "https://digiwed161-sys.github.io/Faiz_weds_Varshana_GS/";
const RSVP_PATH = "faiz-varshana-gs/rsvp";

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyB41fvxvl1KeHOro6WKJ72o22izuCpJ-b4",
  authDomain:        "yaseen-jumana-wedding.firebaseapp.com",
  databaseURL:       "https://yaseen-jumana-wedding-default-rtdb.firebaseio.com",
  projectId:         "yaseen-jumana-wedding",
  storageBucket:     "yaseen-jumana-wedding.firebasestorage.app",
  messagingSenderId: "355557621111",
  appId:             "1:355557621111:web:d0b78c34bfe5a53b69f572"
};
let db = null;
try { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); } catch(e){ console.warn('Firebase init failed', e); }

let rows = [];

function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function esc(s){ return String(s||'').replace(/[<>"'&]/g,c=>({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c])); }

function doLogin(){
  if(document.getElementById('pw').value === PASSWORD){
    document.getElementById('login').style.display='none';
    document.getElementById('dash').style.display='block';
  } else {
    toast('Incorrect password');
  }
}

function loadRSVPs(){
  if(!db){ document.getElementById('tbody').innerHTML='<tr><td colspan="4" class="empty">Database unavailable</td></tr>'; return; }
  db.ref(RSVP_PATH).on('value', snap=>{
    rows = [];
    snap.forEach(c=>{ const v=c.val()||{}; rows.push({key:c.key, ...v}); });
    rows.sort((a,b)=>(b.ts||0)-(a.ts||0));
    render();
  });
}

function fmt(ts){
  if(!ts) return '—';
  try { return new Date(ts).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
  catch(e){ return '—'; }
}

function render(){
  let total=rows.length, yes=0, no=0, guests=0;
  rows.forEach(r=>{
    if(r.attending==='yes'){ yes++; guests += (parseInt(r.members)||0); }
    else if(r.attending==='no'){ no++; }
  });
  document.getElementById('sTotal').textContent  = total;
  document.getElementById('sYes').textContent    = yes;
  document.getElementById('sGuests').textContent = guests;
  document.getElementById('sNo').textContent     = no;

  const tb=document.getElementById('tbody');
  if(!rows.length){ tb.innerHTML='<tr><td colspan="4" class="empty">No responses yet</td></tr>'; return; }
  tb.innerHTML = rows.map(r=>{
    const att = r.attending==='yes';
    return `<tr>
      <td>${esc(r.name)}</td>
      <td><span class="pill ${att?'yes':'no'}">${att?'Attending':'Regrets'}</span></td>
      <td>${att?(parseInt(r.members)||0):'—'}</td>
      <td>${fmt(r.ts)}</td>
    </tr>`;
  }).join('');
}

function buildLink(){
  const name=document.getElementById('guestInput').value.trim();
  const out=document.getElementById('linkOut');
  const wa=document.getElementById('waShare');
  if(!name){ out.style.display='none'; wa.href='#'; return; }
  const url = BASE_URL + '?guest=' + encodeURIComponent(name);
  out.textContent = url; out.style.display='block';
  const msg = `Dear ${name}, you are warmly invited to the Wedding Reception of Faiz & Varshana. View your personal invitation here: ${url}`;
  wa.href = 'https://wa.me/?text=' + encodeURIComponent(msg);
}
function copyLink(){
  const name=document.getElementById('guestInput').value.trim();
  if(!name){ toast('Enter a name first'); return; }
  const url = BASE_URL + '?guest=' + encodeURIComponent(name);
  copyText(url);
}
function copyText(text){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(function(){ toast('Link copied'); }).catch(function(){ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  try {
    const ta=document.createElement('textarea');
    ta.value=text;
    ta.setAttribute('readonly','');
    ta.style.position='fixed'; ta.style.top='-9999px'; ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.focus(); ta.select(); ta.setSelectionRange(0, text.length);
    const ok=document.execCommand('copy');
    document.body.removeChild(ta);
    toast(ok ? 'Link copied' : 'Long-press the link below to copy');
  } catch(e){
    toast('Long-press the link below to copy');
  }
}

function exportCSV(){
  if(!rows.length){ toast('Nothing to export'); return; }
  const head=['Name','Attending','Guests','Submitted'];
  const lines=[head.join(',')];
  rows.forEach(r=>{
    const cells=[r.name||'', r.attending==='yes'?'Yes':'No', r.attending==='yes'?(parseInt(r.members)||0):0, fmt(r.ts)];
    lines.push(cells.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='faiz-varshana-rsvps.csv';
  document.body.appendChild(a); a.click(); a.remove();
  toast('CSV exported');
}
</script>
</body>
</html>
